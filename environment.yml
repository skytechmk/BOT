name: binance-hunter-talib
channels:
  - conda-forge
  - defaults
  - anaconda
dependencies:
  # Python version
  - python=3.11

  # Core Trading and Data Processing
  - pandas>=1.5.0
  - numpy>=1.21.0
  - scipy>=1.9.0
  - statsmodels>=0.14.0

  # Machine Learning - Core
  - scikit-learn>=1.3.0
  - xgboost>=1.7.0
  - joblib>=1.3.0

  # Deep Learning - CUDA Enabled for RTX 3090
  - pytorch
  - torchvision
  - pytorch-cuda  # CUDA 11.8 for RTX 3090 compatibility
  - cudatoolkit

  # Data Visualization
  - matplotlib>=3.6.0
  - seaborn>=0.12.0
  - plotly>=5.15.0

  # Jupyter Support
  - jupyter>=1.0.0
  - ipykernel>=6.0.0
  - notebook>=6.5.0

  # Development Tools
  - pytest>=7.0.0
  - black>=23.0.0
  - flake8>=6.0.0

  # Utilities
  - tqdm>=4.64.0
  - colorama>=0.4.6

  # Performance and Monitoring
  - psutil>=5.9.0

  # Configuration Management
  - pydantic>=2.0.0

  # Async Operations
  - aiohttp>=3.8.0

  # Financial Data Analysis
  - yfinance>=0.2.0

   # Caching
   - redis-py>=5.0.0

  # Logging
  - structlog>=23.0.0

  # Network and API
  - httpx>=0.24.0
  - websockets>=11.0.0
  - asyncpg>=0.29.0
  - requests>=2.28.0
  - urllib3>=1.26.0

  # Environment Management
  - python-dotenv>=1.0.0

  # Additional ML Tools
  - imbalanced-learn>=0.10.0
  - optuna>=3.0.0

  # Data Validation
  - cerberus>=1.3.4

  # Parallel Processing
  - dask>=2023.0.0

  # pip dependencies (not available in conda)
  - pip
  - pip:
    # Trading APIs
    - python-binance>=1.0.19
    - ccxt>=4.0.0
    
    # Technical Analysis
    - TA-Lib>=0.4.28
    
    # Telegram Bot
    - python-telegram-bot>=20.7
    
    # Advanced ML (optional)
    - lightgbm>=4.1.0
    - catboost>=1.2.2
    
    # Transformers
    - transformers>=4.36.2
    
    # Time Series Analysis (pip only)
    - arch>=5.3.0
    
    # Additional utilities
    - rich>=13.0.0
    - diskcache>=5.6.0
    - missingno>=0.5.2
    - alpha-vantage>=2.3.0
    - statsforecast>=1.4.0
    - loguru>=0.7.0
     - memory-profiler>=0.60.0
     
     # Performance Profiling (env-gated)
     - pyinstrument>=5.0.0
     
     # CI/CD Enforcement Layer
     - ruff>=0.9.0
     - mypy>=1.14.0
     - pre-commit>=4.0.0
