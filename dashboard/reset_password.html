<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Anunnaki World</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0d0d0f;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #16161a;
            border: 1px solid #2a2a30;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }
        .logo { text-align: center; margin-bottom: 28px; }
        .logo img { height: 52px; width: 52px; border-radius: 10px; object-fit: cover; }
        .logo-text { display: block; font-size: 13px; color: #888; margin-top: 8px; }
        h2 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: #888; text-align: center; margin-bottom: 24px; line-height: 1.5; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #aaa; margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase; }
        input {
            width: 100%; padding: 11px 14px;
            background: #0d0d0f; border: 1px solid #2a2a30;
            border-radius: 8px; color: #e8e8e8; font-size: 14px;
            font-family: inherit; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #f4a236; }
        .btn {
            width: 100%; padding: 12px;
            background: #f4a236; color: #000;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 700;
            cursor: pointer; transition: opacity 0.2s;
            font-family: inherit; margin-top: 4px;
        }
        .btn:hover { opacity: 0.88; }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn-ghost {
            background: transparent; color: #888; border: 1px solid #2a2a30;
            margin-top: 10px;
        }
        .btn-ghost:hover { border-color: #555; color: #e8e8e8; opacity: 1; }
        .msg {
            padding: 12px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 16px; display: none;
        }
        .msg.error { background: rgba(255,77,106,0.1); border: 1px solid rgba(255,77,106,0.3); color: #ff6b85; }
        .msg.success { background: rgba(0,200,130,0.1); border: 1px solid rgba(0,200,130,0.3); color: #00c882; }
        .back { text-align: center; margin-top: 18px; font-size: 13px; color: #666; }
        .back a { color: #f4a236; text-decoration: none; }
        .back a:hover { text-decoration: underline; }
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(0,0,0,0.3); border-top-color: #000;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .password-wrap { position: relative; }
        .toggle-pw {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #666; cursor: pointer; font-size: 15px; padding: 0;
        }
        .strength-bar { height: 3px; border-radius: 2px; margin-top: 6px; transition: all 0.3s; background: #2a2a30; }
        .strength-bar.weak  { background: #ff4d6a; width: 33%; }
        .strength-bar.fair  { background: #f4a236; width: 66%; }
        .strength-bar.strong { background: #00c882; width: 100%; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <img src="/static/logo.jpeg" alt="Anunnaki World">
        <span class="logo-text">Anunnaki World Signals</span>
    </div>

    <!-- Step 1: Request reset (shown when no token in URL) -->
    <div id="step-request">
        <h2>🔐 Forgot Password?</h2>
        <p class="subtitle">Enter your account email and we'll send you a reset link valid for 1 hour.</p>
        <div class="msg" id="req-msg"></div>
        <div class="form-group">
            <label>Email address</label>
            <input type="email" id="req-email" placeholder="you@example.com"
                   onkeydown="if(event.key==='Enter')requestReset()">
        </div>
        <button class="btn" id="req-btn" onclick="requestReset()">Send Reset Link</button>
        <div class="back"><a href="/">← Back to Dashboard</a></div>
    </div>

    <!-- Step 2: Set new password (shown when token in URL) -->
    <div id="step-reset" style="display:none">
        <h2>🔑 Set New Password</h2>
        <p class="subtitle">Choose a strong password for your account.</p>
        <div class="msg" id="reset-msg"></div>
        <div class="form-group">
            <label>New Password</label>
            <div class="password-wrap">
                <input type="password" id="reset-pw" placeholder="Min 6 characters"
                       oninput="checkStrength(this.value)"
                       onkeydown="if(event.key==='Enter')doReset()">
                <button class="toggle-pw" type="button" onclick="togglePw('reset-pw',this)">👁</button>
            </div>
            <div class="strength-bar" id="strength-bar"></div>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-wrap">
                <input type="password" id="reset-pw2" placeholder="Repeat password"
                       onkeydown="if(event.key==='Enter')doReset()">
                <button class="toggle-pw" type="button" onclick="togglePw('reset-pw2',this)">👁</button>
            </div>
        </div>
        <button class="btn" id="reset-btn" onclick="doReset()">Update Password</button>
        <div class="back"><a href="/">← Back to Dashboard</a></div>
    </div>
</div>

<script>
const _token = new URLSearchParams(window.location.search).get('token');

window.addEventListener('DOMContentLoaded', () => {
    if (_token) {
        document.getElementById('step-request').style.display = 'none';
        document.getElementById('step-reset').style.display = 'block';
    }
});

function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = `msg ${type}`;
    el.textContent = text;
    el.style.display = 'block';
}

function togglePw(inputId, btn) {
    const inp = document.getElementById(inputId);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
}

function checkStrength(pw) {
    const bar = document.getElementById('strength-bar');
    if (!pw) { bar.className = 'strength-bar'; return; }
    const strong = pw.length >= 10 && /[A-Z]/.test(pw) && /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw);
    const fair   = pw.length >= 6;
    bar.className = 'strength-bar ' + (strong ? 'strong' : fair ? 'fair' : 'weak');
}

async function requestReset() {
    const email = document.getElementById('req-email').value.trim();
    if (!email || !email.includes('@')) {
        showMsg('req-msg', 'error', 'Please enter a valid email address'); return;
    }
    const btn = document.getElementById('req-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Sending...';
    try {
        const res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (data.ok) {
            showMsg('req-msg', 'success',
                '✅ If that email is registered, a reset link has been sent. Check your inbox (and spam folder).');
            document.getElementById('req-email').disabled = true;
            btn.style.display = 'none';
        } else {
            showMsg('req-msg', 'error', data.error || 'Something went wrong');
            btn.disabled = false;
            btn.textContent = 'Send Reset Link';
        }
    } catch(e) {
        showMsg('req-msg', 'error', 'Connection error — please try again');
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
    }
}

async function doReset() {
    const pw  = document.getElementById('reset-pw').value;
    const pw2 = document.getElementById('reset-pw2').value;
    if (pw.length < 6) {
        showMsg('reset-msg', 'error', 'Password must be at least 6 characters'); return;
    }
    if (pw !== pw2) {
        showMsg('reset-msg', 'error', 'Passwords do not match'); return;
    }
    const btn = document.getElementById('reset-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Updating...';
    try {
        const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: _token, password: pw }),
        });
        const data = await res.json();
        if (data.ok) {
            showMsg('reset-msg', 'success', '✅ ' + data.message);
            document.getElementById('reset-pw').disabled  = true;
            document.getElementById('reset-pw2').disabled = true;
            btn.textContent = 'Go to Dashboard';
            btn.disabled = false;
            btn.onclick = () => window.location.href = '/';
        } else {
            showMsg('reset-msg', 'error', data.error || 'Something went wrong');
            btn.disabled = false;
            btn.textContent = 'Update Password';
        }
    } catch(e) {
        showMsg('reset-msg', 'error', 'Connection error — please try again');
        btn.disabled = false;
        btn.textContent = 'Update Password';
    }
}
</script>
</body>
</html>
