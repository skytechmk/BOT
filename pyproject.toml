# ─── Ruff ────────────────────────────────────────────────────────────────────

[tool.ruff]
target-version = "py310"
line-length    = 120
exclude        = [
    ".git",
    ".venv",
    "__pycache__",
    "aladdin_core",          # Rust/PyO3 FFI — not subject to Python linting
    "*.pyi",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "B",   # flake8-bugbear
    "I",   # isort
]

# Rules that conflict with existing codebase patterns — tighten incrementally.
ignore = []

[tool.ruff.lint.isort]
known-first-party = [
    "aladdin_core",
    "dashboard",
]

[tool.ruff.lint.per-file-ignores]
# Ignore isort / bugbear on auto-generated or test files if needed.

# ─── Ruff Formatter ──────────────────────────────────────────────────────────

[tool.ruff.format]
exclude = ["aladdin_core"]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

# ─── Mypy ────────────────────────────────────────────────────────────────────

[tool.mypy]
python_version       = "3.10"
strict               = false       # project-wide default
warn_return_any      = true
warn_unused_configs  = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs   = true
no_implicit_optional = true
ignore_missing_imports = true      # pandas, numpy, binance, etc.

[[tool.mypy.overrides]]
# Core execution files: full strict typing enforced.
module = [
    "predator",
    "reverse_hunt",
]
strict = true
disallow_any_generics = true
warn_unreachable      = true

[[tool.mypy.overrides]]
# CI/CD enforcement layer — itself must be clean.
module = [
    "dashboard.redis_cache",
    "trailing_engine",
]
strict = true

[[tool.mypy.overrides]]
# Third-party libraries without stubs.
module = [
    "pandas.*",
    "numpy.*",
    "binance.*",
    "ccxt.*",
    "talib.*",
    "sklearn.*",
    "torch.*",
    "xgboost.*",
    "loguru",
    "websockets.*",
    "redis.*",
    "aiohttp.*",
    "requests.*",
    "structlog",
    "yaml.*",
    "plotly.*",
    "psutil",
    "optuna.*",
    "scipy.*",
    "statsmodels.*",
    "imblearn.*",
    "lightgbm.*",
    "catboost.*",
    "arch.*",
    "statsforecast.*",
    "yfinance",
    "tvdatafeed",
    "cerberus",
    "missingno",
    "httpx",
    "asyncpg",
    "pywebpush",
    "cryptography.*",
    "dotenv",
    "memory_profiler",
]
ignore_missing_imports = true
